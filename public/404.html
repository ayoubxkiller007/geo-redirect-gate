<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <style>
      html,
      body {
        margin: 0;
        background: #fff;
        min-height: 100vh;
      }
    </style>
    <script>
      (function () {
        var base = '/';
        if (location.hostname.endsWith('github.io')) {
          var seg = location.pathname.split('/').filter(Boolean)[0];
          if (seg) base = '/' + seg + '/';
        }
        var path = location.pathname;
        var rIdx = path.indexOf('/r/');
        if (rIdx !== -1) {
          var token = path.slice(rIdx + 3).replace(/\/$/, '');
          if (token) {
            location.replace(base + 'gate.html?link=' + encodeURIComponent(token));
            return;
          }
        }
        location.replace(base || '/');
      })();
    </script>
  </head>
  <body></body>
</html>
