<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <script>
      (function () {
        var base = '/';
        if (location.hostname.endsWith('github.io')) {
          var seg = location.pathname.split('/').filter(Boolean)[0];
          if (seg) base = '/' + seg + '/';
        }
        var el = document.createElement('base');
        el.href = base;
        document.head.prepend(el);
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>غير متاح</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #111;
        color: #ddd;
        text-align: center;
        padding: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>غير متاح في منطقتك</h1>
      <p>هذا الرابط مخصص لزوار من دولة محددة فقط.</p>
    </div>
  </body>
</html>
