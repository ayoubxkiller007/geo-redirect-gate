<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title></title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: #ffffff;
      }
      .hp {
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }
    </style>
    <script>
      (function () {
        var base = '/';
        if (location.hostname.endsWith('github.io')) {
          var seg = location.pathname.split('/').filter(Boolean)[0];
          if (seg) base = '/' + seg + '/';
        }
        var el = document.createElement('base');
        el.href = base;
        document.head.prepend(el);
      })();
    </script>
    <script src="js/geo-gate-shared.js"></script>
  </head>
  <body>
    <input class="hp" type="text" name="website" id="hp" tabindex="-1" autocomplete="off" aria-hidden="true" />

    <script>
      (function () {
        'use strict';

        var started = Date.now();
        var params = new URLSearchParams(window.location.search);
        var linkId = decodeURIComponent(params.get('link') || '').trim();
        var verifyDone = false;

        if (!linkId) {
          var path = location.pathname;
          var rIdx = path.indexOf('/r/');
          if (rIdx !== -1) {
            linkId = decodeURIComponent(path.slice(rIdx + 3).replace(/\/$/, ''));
          }
        }

        function looksLikeBot() {
          if (navigator.webdriver) return true;
          if (!navigator.userAgent) return true;
          return /bot|crawl|spider|HeadlessChrome|PhantomJS|selenium|puppeteer|playwright/i.test(
            navigator.userAgent
          );
        }

        function runVerify() {
          if (verifyDone) return;
          verifyDone = true;

          if (!linkId || !window.GeoGate) return;

          var payload = {
            linkId: linkId,
            elapsedMs: Date.now() - started,
            webdriver: !!navigator.webdriver,
            hp: document.getElementById('hp').value || '',
            botUa: false,
          };

          function go(url) {
            window.location.replace(url);
          }

          if (GeoGate.isStaticHost()) {
            GeoGate.verifyLinkClient(payload).then(function (data) {
              if (data && data.ok && data.redirect) go(data.redirect);
            });
            return;
          }

          fetch('/api/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              linkId: linkId,
              elapsedMs: payload.elapsedMs,
              webdriver: payload.webdriver,
              hp: payload.hp,
              ua: navigator.userAgent || '',
            }),
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              if (data && data.ok && data.redirect) go(data.redirect);
            });
        }

        function boot() {
          if (!linkId || looksLikeBot()) return;
          if (!window.crypto || !window.crypto.subtle) return;

          if (!window.GeoGate) {
            setTimeout(boot, 30);
            return;
          }

          var minMs = GeoGate.MIN_WAIT_MS || 1200;
          setTimeout(runVerify, minMs);
        }

        boot();
      })();
    </script>
  </body>
</html>
