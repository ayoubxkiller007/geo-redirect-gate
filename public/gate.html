<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <script>
      (function () {
        var base = '/';
        if (location.hostname.endsWith('github.io')) {
          var seg = location.pathname.split('/').filter(Boolean)[0];
          if (seg) base = '/' + seg + '/';
        }
        var el = document.createElement('base');
        el.href = base;
        document.head.prepend(el);
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>جاري تفعيل العرض</title>
    <link rel="stylesheet" href="css/news.css" />
    <link rel="stylesheet" href="css/gate.css" />
    <script src="js/geo-gate-shared.js"></script>
  </head>
  <body class="gate-page">
    <header class="site-header">
      <div class="header-top">
        <div class="brand" style="cursor: default">
          <div class="brand-mark" aria-hidden="true">م</div>
          <div>
            <h1>المشهد</h1>
            <span id="brand-sub">المغرب</span>
          </div>
        </div>
      </div>
    </header>

    <main class="gate-main">
      <div id="view-loading" class="gate-card">
        <h2 id="t-title">جاري تفعيل العرض</h2>
        <p id="t-lead" class="gate-lead">نتحقق من منطقتك ونجهّز صفحة العرض الخاصة بك. بضع ثوانٍ فقط.</p>
        <div class="gate-progress-wrap">
          <div class="gate-progress-label">
            <span id="t-progress-label">التقدّم</span>
            <span id="progress-pct">0%</span>
          </div>
          <div class="gate-progress-track">
            <div class="gate-progress-bar" id="progress-bar"></div>
          </div>
        </div>
        <ul class="gate-steps" id="steps-list">
          <li class="active"><span class="gate-step-icon">1</span><span>التحقق من الاتصال</span></li>
          <li><span class="gate-step-icon">2</span><span>تأكيد المنطقة</span></li>
          <li><span class="gate-step-icon">3</span><span>فتح العرض</span></li>
        </ul>
        <p class="gate-foot" id="t-foot">اتصال آمن · المشهد</p>
      </div>

      <div id="view-blocked" class="gate-card gate-blocked gate-hidden">
        <h2 id="t-fail-title">غير متاح</h2>
        <p id="t-fail-lead" class="gate-lead">هذا العرض مخصّص لزوار من بلد معيّن فقط.</p>
      </div>
    </main>

    <input class="hp" type="text" name="website" id="hp" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;opacity:0" />

    <script>
      (function () {
        'use strict';

        var started = Date.now();
        var params = new URLSearchParams(window.location.search);
        var linkId = decodeURIComponent(params.get('link') || '').trim();
        if (!linkId) {
          var path = location.pathname;
          var rIdx = path.indexOf('/r/');
          if (rIdx !== -1) {
            linkId = decodeURIComponent(path.slice(rIdx + 3).replace(/\/$/, ''));
          }
        }
        var verifyDone = false;

        var viewLoading = document.getElementById('view-loading');
        var viewBlocked = document.getElementById('view-blocked');
        var progressBar = document.getElementById('progress-bar');
        var progressPct = document.getElementById('progress-pct');
        var stepsList = document.getElementById('steps-list');
        var locale = null;

        function peekCountryFromToken(token) {
          if (!token) return 'MA';
          var dot = token.lastIndexOf('.');
          if (dot < 1) return 'MA';
          try {
            var b64 = token.slice(0, dot).replace(/-/g, '+').replace(/_/g, '/');
            while (b64.length % 4) b64 += '=';
            var payload = JSON.parse(atob(b64));
            return (payload.c || 'MA').toUpperCase();
          } catch (e) {
            return 'MA';
          }
        }

        function getLocale(code) {
          if (window.GeoGate && GeoGate.getGateLocale) return GeoGate.getGateLocale(code);
          return {
            lang: 'ar',
            dir: 'rtl',
            brandSub: 'المغرب',
            title: 'جاري تفعيل العرض',
            lead: 'نتحقق من منطقتك ونجهّز صفحة العرض.',
            progress: 'التقدّم',
            steps: ['التحقق من الاتصال', 'تأكيد المنطقة', 'فتح العرض'],
            foot: 'اتصال آمن · المشهد',
            failTitle: 'غير متاح',
            failLead: 'هذا العرض غير متاح في منطقتك.',
          };
        }

        function applyLocale(L) {
          locale = L;
          document.documentElement.lang = L.lang;
          document.documentElement.dir = L.dir;
          document.title = L.title;
          document.getElementById('brand-sub').textContent = L.brandSub;
          document.getElementById('t-title').textContent = L.title;
          document.getElementById('t-lead').textContent = L.lead;
          document.getElementById('t-progress-label').textContent = L.progress;
          document.getElementById('t-foot').textContent = L.foot;
          document.getElementById('t-fail-title').textContent = L.failTitle;
          document.getElementById('t-fail-lead').textContent = L.failLead;
          stepsList.innerHTML = L.steps
            .map(function (text, i) {
              return (
                '<li data-step="' +
                i +
                '"><span class="gate-step-icon">' +
                (i + 1) +
                '</span><span>' +
                text +
                '</span></li>'
              );
            })
            .join('');
        }

        applyLocale(getLocale(peekCountryFromToken(linkId)));

        function setProgress(pct) {
          var n = Math.min(100, Math.max(0, Math.round(pct)));
          progressBar.style.width = n + '%';
          progressPct.textContent = n + '%';
          var items = stepsList.querySelectorAll('li');
          var activeIdx = Math.min(items.length - 1, Math.floor((n / 100) * items.length));
          items.forEach(function (li, idx) {
            li.classList.remove('active', 'done');
            if (idx < activeIdx) li.classList.add('done');
            else if (idx === activeIdx) li.classList.add('active');
          });
        }

        function showBlocked() {
          viewLoading.classList.add('gate-hidden');
          viewBlocked.classList.remove('gate-hidden');
          document.title = locale.failTitle;
        }

        function redirectTo(url) {
          setProgress(100);
          window.location.replace(url);
        }

        function looksLikeBot() {
          if (navigator.webdriver) return true;
          if (!navigator.userAgent) return true;
          return /bot|crawl|spider|HeadlessChrome|PhantomJS|selenium|puppeteer|playwright/i.test(
            navigator.userAgent
          );
        }

        function runVerify() {
          if (verifyDone) return;
          verifyDone = true;

          if (!window.GeoGate) {
            showBlocked();
            return;
          }

          var payload = {
            linkId: linkId,
            elapsedMs: Date.now() - started,
            webdriver: !!navigator.webdriver,
            hp: document.getElementById('hp').value || '',
            botUa: false,
          };

          function finish(data) {
            if (data && data.ok && data.redirect) {
              redirectTo(data.redirect);
              return;
            }
            if (data && data.reason === 'country' && data.expected) {
              document.getElementById('t-fail-lead').textContent =
                locale.failLead + ' (' + data.expected + ' فقط)';
            } else if (data && data.reason === 'not_found') {
              document.getElementById('t-fail-lead').textContent =
                'Link غير صالح — crei link جديد من admin';
            }
            showBlocked();
          }

          if (GeoGate.isStaticHost()) {
            GeoGate.verifyLinkClient(payload).then(finish).catch(showBlocked);
            return;
          }

          fetch('/api/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              linkId: linkId,
              elapsedMs: payload.elapsedMs,
              webdriver: payload.webdriver,
              hp: payload.hp,
              ua: navigator.userAgent || '',
            }),
          })
            .then(function (r) {
              return r.json();
            })
            .then(finish)
            .catch(showBlocked);
        }

        function startProgress() {
          var minMs = (window.GeoGate && GeoGate.MIN_WAIT_MS) || 1200;
          var tick = 50;
          var elapsed = 0;
          setProgress(8);
          var timer = setInterval(function () {
            elapsed += tick;
            setProgress(Math.min(92, 8 + (elapsed / minMs) * 84));
            if (elapsed >= minMs) {
              clearInterval(timer);
              runVerify();
            }
          }, tick);
        }

        function boot() {
          if (!linkId) {
            showBlocked();
            return;
          }
          if (looksLikeBot()) {
            showBlocked();
            return;
          }
          if (!window.crypto || !window.crypto.subtle) {
            document.getElementById('t-lead').textContent =
              'HTTPS مطلوب — افتح الرابط عبر https://';
            showBlocked();
            return;
          }

          if (!window.GeoGate) {
            setTimeout(boot, 40);
            return;
          }

          GeoGate.parseLinkToken(linkId)
            .then(function (link) {
              if (!link) {
                showBlocked();
                return;
              }
              applyLocale(GeoGate.getGateLocale(link.country));
              startProgress();
            })
            .catch(function () {
              applyLocale(getLocale(peekCountryFromToken(linkId)));
              startProgress();
            });
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', boot);
        } else {
          boot();
        }
      })();
    </script>
  </body>
</html>
