<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>جاري التحميل...</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: #0b1020;
        color: #e8ecf4;
      }
      .card {
        text-align: center;
        padding: 2rem 1.5rem;
      }
      .spinner {
        width: 42px;
        height: 42px;
        margin: 0 auto 1rem;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #5b8cff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      p {
        margin: 0;
        opacity: 0.85;
        font-size: 0.95rem;
      }
      .hp {
        position: absolute;
        left: -9999px;
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner" aria-hidden="true"></div>
      <p id="msg">جاري التحقق...</p>
    </div>
    <input class="hp" type="text" name="website" id="hp" tabindex="-1" autocomplete="off" />

    <script>
      (function () {
        'use strict';

        var started = Date.now();
        var msg = document.getElementById('msg');
        var params = new URLSearchParams(window.location.search);
        var linkId = (params.get('link') || '').trim().toLowerCase();

        function looksLikeBot() {
          if (navigator.webdriver) return true;
          if (!navigator.userAgent) return true;
          return /bot|crawl|spider|HeadlessChrome|PhantomJS|selenium|puppeteer|playwright/i.test(
            navigator.userAgent
          );
        }

        function fail() {
          msg.textContent = 'غير متاح';
          document.title = 'غير متاح';
        }

        function verify() {
          if (!linkId) {
            fail();
            return;
          }
          if (looksLikeBot()) {
            fail();
            return;
          }

          fetch('/api/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              linkId: linkId,
              elapsedMs: Date.now() - started,
              webdriver: !!navigator.webdriver,
              hp: document.getElementById('hp').value || '',
              ua: navigator.userAgent || '',
            }),
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              if (data && data.ok && data.redirect) {
                window.location.replace(data.redirect);
                return;
              }
              fail();
            })
            .catch(fail);
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function () {
            setTimeout(verify, 1300);
          });
        } else {
          setTimeout(verify, 1300);
        }
      })();
    </script>
  </body>
</html>
